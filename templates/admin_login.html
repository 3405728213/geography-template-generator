<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台登录 - 地理答题模板生成器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f1f5f9; display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff; padding: 40px 36px; border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 360px; max-width: 90vw;
        }
        .login-box h2 { font-size: 1.3rem; margin-bottom: 6px; text-align: center; }
        .login-box .sub { font-size: 0.8rem; color: #94a3b8; text-align: center; margin-bottom: 24px; }
        .login-box input {
            width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 8px;
            font-size: 0.95rem; margin-bottom: 16px; outline: none; font-family: inherit;
        }
        .login-box input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .login-box button {
            width: 100%; padding: 12px; background: #2563eb; color: #fff; border: none;
            border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        .login-box button:hover { background: #1d4ed8; }
        .error { color: #dc2626; font-size: 0.85rem; text-align: center; margin-bottom: 12px; display: none; }
        .back { display: block; text-align: center; margin-top: 14px; font-size: 0.8rem; color: #64748b; text-decoration: none; }
        .back:hover { color: #2563eb; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 后台管理</h2>
        <p class="sub">地理答题模板生成器</p>
        <p class="error" id="error">密码错误</p>
        <input type="password" id="password" placeholder="请输入管理密码" autofocus>
        <button onclick="login()">登 录</button>
        <a href="/" class="back">← 返回首页</a>
    </div>
    <script>
        async function login() {
            const pw = document.getElementById('password').value;
            const resp = await fetch('/admin/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({password: pw})
            });
            const data = await resp.json();
            if (data.success) {
                location.href = '/admin';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
